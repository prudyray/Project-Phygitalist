{% load i18n %}
{% load category_tags %}
{% load site_urls %}

<form class="form-inline my-2 my-lg-0" method="GET" action="{% site_url SITE_BUYER 'search:search' %}">
    <select class="select-active" name="category">
        {% category_tree depth=1 as tree_categories %}
        <option value="0">All Categories</option>
        {% for category, info in tree_categories %}
        <option value="{{category.id}}">{{ category.name }}</option>
        {% endfor %}
    </select>
    <input id="search-autocomplete-input" name="q" placeholder="{% trans 'Search' %}" aria-label="{% trans 'Search' %}" autocomplete="off">
</form>

<script>
(function ($) {
    $(function () {
        var $input = $('#search-autocomplete-input');
        if (!$input.length || typeof $.fn.autocomplete === 'undefined') return;

        var autocompleteUrl = '{% site_url SITE_BUYER "search:autocomplete" %}';

        $input.autocomplete({
            minLength: 3,
            delay: 200,
            source: function (request, response) {
                $.getJSON(autocompleteUrl, { q: request.term }, function (data) {
                    response(data.results || []);
                }).fail(function () { response([]); });
            },
            select: function (event, ui) {
                $input.val(ui.item.value);
                $input.closest('form').submit();
                return false;
            }
        });
    });
}(jQuery));
</script>
